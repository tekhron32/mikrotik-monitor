<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NebulaNet</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--bg2:#0f1218;--bg3:#151a22;--bg4:#1a2030;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8eaf0;--text2:#7a8394;--text3:#4a5468;--accent:#3b82f6;--green:#10b981;--yellow:#f59e0b;--purple:#8b5cf6;--red:#ef4444;--mono:'JetBrains Mono',monospace;--sans:'Manrope',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:24px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:19px;font-weight:800;letter-spacing:-.5px}
.logo-sub{font-size:10px;color:var(--text2);font-family:var(--mono)}
.hdr-r{display:flex;align-items:center;gap:12px}
.live{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);font-family:var(--mono)}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:7px 14px;border-radius:7px;font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--accent);color:var(--text)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;cursor:default;transition:border-color .2s}
.stat:hover{border-color:var(--border2)}
.stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-bottom:8px}
.stat-value{font-size:26px;font-weight:800;letter-spacing:-1px}
.blue{color:var(--accent)}.green{color:var(--green)}.yellow{color:var(--yellow)}.purple{color:var(--purple)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}
.tooltip{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--bg4);border:1px solid var(--border2);border-radius:10px;padding:14px;z-index:100;display:none;min-width:260px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.stat:hover .tooltip{display:block}
.tt-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:10px;font-family:var(--mono)}
.tt-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)}
.tt-row:last-child{border-bottom:none}
.tt-left{display:flex;align-items:center;gap:8px;font-size:12px;min-width:0}
.tt-icon{font-size:14px;flex-shrink:0}
.tt-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.tt-val{font-size:11px;font-family:var(--mono);color:var(--text2);flex-shrink:0}
.tt-bar{height:2px;background:var(--border);border-radius:1px;margin-top:3px}
.tt-bar-fill{height:100%;background:var(--accent);border-radius:1px}
.layout{display:grid;grid-template-columns:360px 1fr;gap:18px}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:13px;overflow:hidden;display:flex;flex-direction:column}
.sec-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text2)}
.badge{font-size:11px;font-family:var(--mono);color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:4px}
.devices{overflow-y:auto;flex:1;max-height:640px}
.device{padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:10px}
.device:hover{background:var(--bg3)}
.device.active{background:rgba(59,130,246,0.07);border-left:2px solid var(--accent)}
.dev-av{width:32px;height:32px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid var(--border)}
.dev-info{flex:1;min-width:0}
.dev-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dev-name-inp{background:var(--bg3);border:1px solid var(--accent);border-radius:4px;padding:1px 6px;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--text);outline:none;width:100%}
.dev-ip{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.dev-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.dev-dns{font-size:10px;font-family:var(--mono);color:var(--text2);background:var(--bg3);padding:2px 6px;border-radius:4px;min-width:32px;text-align:center}
.dev-dns.high{color:var(--yellow);border:1px solid rgba(245,158,11,.25)}
.dev-dns.med{color:var(--accent);border:1px solid rgba(59,130,246,.2)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.on{background:var(--green)}.dot.off{background:var(--text3)}
.edit-btn{width:18px;height:18px;background:transparent;border:none;color:var(--text3);cursor:pointer;border-radius:3px;font-size:10px;opacity:0;display:flex;align-items:center;justify-content:center}
.device:hover .edit-btn{opacity:1}
.edit-btn:hover{color:var(--accent)}
.act-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.act-av{width:38px;height:38px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:17px;border:1px solid var(--border2);flex-shrink:0}
.act-name{font-size:15px;font-weight:700}
.act-ip{font-size:10px;font-family:var(--mono);color:var(--text2);margin-top:1px}
.time-filter{margin-left:auto;display:flex;gap:4px}
.time-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:4px 9px;border-radius:5px;font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.time-btn.active,.time-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.domain-list{padding:10px 16px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:5px}
.domain-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;transition:all .2s}
.domain-row:hover{border-color:var(--border2);background:var(--bg4)}
.d-icon{font-size:17px;flex-shrink:0;width:26px;text-align:center}
.d-info{flex:1;min-width:0}
.d-svc{font-size:13px;font-weight:600}
.d-raw{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-hits{font-size:11px;font-family:var(--mono);color:var(--text2);flex-shrink:0;min-width:36px;text-align:right}
.d-bar-w{width:70px;flex-shrink:0}
.d-bar{height:3px;background:var(--border);border-radius:2px}
.d-bar-f{height:100%;border-radius:2px;transition:width .5s}
.sess-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.sess-dot.active{background:var(--green);box-shadow:0 0 4px var(--green)}
.sess-dot.inactive{background:var(--text3)}
.tf-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:all .15s}
.tf-btn.on{background:rgba(59,130,246,.15);border-color:var(--accent);color:var(--accent)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:24px;width:460px;max-width:95vw;max-height:80vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px}
.modal-close:hover{border-color:var(--accent);color:var(--text)}
.u-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.u-row:hover{border-color:var(--accent)}
.cat-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);transition:all .2s;opacity:.8}
.cat-pill:hover{opacity:1;transform:translateY(-1px)}
.cat-pill.on{opacity:1;box-shadow:0 2px 10px rgba(0,0,0,.4);transform:translateY(-1px)}
.empty{padding:50px;text-align:center;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.4}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text3);gap:10px;padding:40px;min-height:300px}
.ph-icon{font-size:44px;opacity:.2}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--text2);font-size:13px}
.spinner{width:15px;height:15px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--green);color:var(--green);padding:10px 18px;border-radius:8px;font-size:12px;z-index:200;opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:900px){.layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-icon">🌐</div>
      <div><div class="logo-text">NebulaNet</div><div class="logo-sub">NETWORK MONITOR</div></div>
    </div>
    <div class="hdr-r">
      <div class="live"><div class="live-dot"></div>LIVE</div>
      <button class="btn" onclick="loadAll()">↻ Обновить</button>
    </div>
  </header>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Общий трафик</div>
      <div class="stat-value blue" id="s-bytes">—</div>
      <div class="stat-sub" id="s-sess">—</div>
      <div class="tooltip" style="min-width:270px">
        <div class="tt-title">Топ по трафику</div>
        <div style="display:flex;gap:4px;margin-bottom:10px;background:var(--bg3);padding:3px;border-radius:8px">
          <button onclick="event.stopPropagation();setTrafficPeriod(1,'1h')" id="tp-1h" style="flex:1;padding:5px 2px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .2s">1ч</button>
          <button onclick="event.stopPropagation();setTrafficPeriod(1,'1d')" id="tp-1d" style="flex:1;padding:5px 2px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .2s">1д</button>
          <button onclick="event.stopPropagation();setTrafficPeriod(7,'7d')" id="tp-7d" style="flex:1;padding:5px 2px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:11px;cursor:pointer;font-family:var(--sans);font-weight:700;transition:all .2s">7д</button>
          <button onclick="event.stopPropagation();setTrafficPeriod(30,'30d')" id="tp-30d" style="flex:1;padding:5px 2px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .2s">30д</button>
        </div>
        <div id="tt-traffic">—</div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-label">Активных устройств</div>
      <div class="stat-value green" id="s-dev">—</div>
      <div class="stat-sub">онлайн сейчас</div>
      <div class="tooltip"><div class="tt-title">Самые активные (1ч)</div><div id="tt-devices">—</div></div>
    </div>
    <div class="stat" onclick="openTopSites()" style="cursor:pointer">
      <div class="stat-label">Топ сайт сегодня ↗</div>
      <div class="stat-value purple" id="s-top" style="font-size:16px;padding-top:4px">—</div>
      <div class="stat-sub" id="s-top2">—</div>
      <div class="tooltip"><div class="tt-title">Топ сайты (1ч)</div><div id="tt-sites">—</div></div>
    </div>
    <div class="stat">
      <div class="stat-label">DNS запросов (1ч)</div>
      <div class="stat-value yellow" id="s-dns">—</div>
      <div class="stat-sub">локальных устройств</div>
      <div class="tooltip"><div class="tt-title">Топ по DNS (1ч)</div><div id="tt-dns">—</div></div>
    </div>
  </div>
  <div class="layout">
    <div class="section" style="max-height:700px">
      <div class="sec-hdr"><div class="sec-title">Устройства</div><div class="badge" id="dev-count">0</div></div>
      <div style="padding:6px 12px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-shrink:0">
        <button class="tf-btn on" onclick="setTF(this,'all')">Все</button>
        <button class="tf-btn" onclick="setTF(this,'pc')">💻 ПК</button>
        <button class="tf-btn" onclick="setTF(this,'phone')">📱 Тел</button>
        <button class="tf-btn" onclick="setTF(this,'sip')">☎️ SIP</button>
        <button class="tf-btn" onclick="setTF(this,'other')">📡 Др</button>
      </div>
      <div style="padding:6px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-shrink:0">
        <input id="dev-srch" style="flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 9px;border-radius:6px;font-size:12px;outline:none;font-family:var(--sans)" placeholder="🔍 IP, имя, MAC..." oninput="renderDevs()">
        <select id="dev-srt" style="background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:5px 7px;border-radius:6px;font-size:11px;outline:none;cursor:pointer" onchange="renderDevs()">
          <option value="dns">По DNS</option>
          <option value="name">По имени</option>
          <option value="ip">По IP</option>
          <option value="online">Онлайн</option>
        </select>
      </div>
      <div class="devices" id="dev-list"><div class="loading"><div class="spinner"></div>Загрузка...</div></div>
    </div>
    <div class="section" style="max-height:700px" id="act-section">
      <div class="sec-hdr"><div class="sec-title">Активность</div><div class="badge" id="act-count">—</div></div>
      <div class="placeholder"><div class="ph-icon">👆</div><div>Выберите устройство слева</div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const DOMAIN_MAP={'facebook.com':'Facebook','fbcdn.net':'Facebook','fb.com':'Facebook','instagram.com':'Instagram','cdninstagram.com':'Instagram','telegram.org':'Telegram','t.me':'Telegram','vk.com':'VK','userapi.com':'VK','twitter.com':'Twitter/X','x.com':'Twitter/X','twimg.com':'Twitter/X','tiktok.com':'TikTok','tiktokcdn.com':'TikTok','linkedin.com':'LinkedIn','licdn.com':'LinkedIn','whatsapp.com':'WhatsApp','whatsapp.net':'WhatsApp','google.com':'Google','googleapis.com':'Google Services','gstatic.com':'Google','googlevideo.com':'YouTube','youtube.com':'YouTube','ytimg.com':'YouTube','ggpht.com':'YouTube','gmail.com':'Gmail','googlemail.com':'Gmail','microsoft.com':'Microsoft','microsoftonline.com':'Microsoft','office.com':'Microsoft Office','officeapps.live.com':'Microsoft Office','live.com':'Microsoft','outlook.com':'Outlook','hotmail.com':'Outlook','windowsupdate.com':'Windows Update','update.microsoft.com':'Windows Update','teams.microsoft.com':'Microsoft Teams','apple.com':'Apple','icloud.com':'iCloud','mzstatic.com':'App Store','amazon.com':'Amazon','amazonaws.com':'Amazon AWS','cloudfront.net':'Amazon CDN','netflix.com':'Netflix','nflxvideo.net':'Netflix','spotify.com':'Spotify','scdn.co':'Spotify','cloudflare.com':'Cloudflare','cloudflare-dns.com':'Cloudflare DNS','chrome.cloudflare-dns.com':'Cloudflare DNS','ringcentral.com':'RingCentral','glip.com':'RingCentral','zoom.us':'Zoom','slack.com':'Slack','notion.so':'Notion','samsara.com':'Samsara','msn.com':'MSN','bing.com':'Bing','mail.ru':'Mail.ru','ok.ru':'Одноклассники','yandex.ru':'Яндекс','yandex.com':'Яндекс','uzbfreight.uz':'Uzbfreight','ofi.com':'OFI','xerox.com':'Xerox','drivehos.app':'DriveHOS','loadex.ai':'Loadex AI','amplitude.com':'Amplitude','api.amplitude.com':'Amplitude','launchdarkly.com':'LaunchDarkly','datadoghq.com':'Datadog','hbtbank.com':'HBT Bank','action1.com':'Action1','darkreader.org':'Dark Reader','pool.ntp.org':'NTP','ubervoip.net':'UberVoip','datatruck.io':'Datatruck','c.pki.goog':'Google PKI','pki.goog':'Google PKI'};
const ICONS={'Facebook':'📘','Instagram':'📷','Telegram':'✈️','VK':'💙','Twitter/X':'🐦','TikTok':'🎵','LinkedIn':'💼','WhatsApp':'💬','Google':'🔍','Google Services':'⚙️','YouTube':'▶️','Gmail':'📧','Microsoft':'🪟','Microsoft Office':'📄','Outlook':'📬','Windows Update':'🔄','Microsoft Teams':'💬','Apple':'🍎','iCloud':'☁️','App Store':'📱','Amazon':'📦','Amazon AWS':'☁️','Amazon CDN':'🌐','Netflix':'🎬','Spotify':'🎧','Cloudflare':'🟠','Cloudflare DNS':'🛡️','RingCentral':'📞','Zoom':'📹','Slack':'💬','Notion':'📓','Samsara':'🚛','MSN':'🪟','Bing':'🔎','Mail.ru':'📮','Одноклассники':'👥','Яндекс':'🔴','Uzbfreight':'🏢','OFI':'🏢','Xerox':'🖨️','DriveHOS':'🚚','Loadex AI':'🤖','Amplitude':'📊','LaunchDarkly':'🚀','Datadog':'🐶','HBT Bank':'🏦','Action1':'🔧','Dark Reader':'🌙','NTP':'⏱️','UberVoip':'📟','Datatruck':'🚛','Google PKI':'🔒'};
const CATS={'Facebook':'social','Instagram':'social','Telegram':'social','VK':'social','Twitter/X':'social','TikTok':'social','LinkedIn':'social','WhatsApp':'social','YouTube':'media','Netflix':'media','Spotify':'media','Google':'work','Gmail':'work','Microsoft':'work','Microsoft Office':'work','Outlook':'work','Microsoft Teams':'work','Zoom':'work','Slack':'work','RingCentral':'work','Uzbfreight':'work','DriveHOS':'work','Datatruck':'work','Windows Update':'system','Cloudflare DNS':'system','NTP':'system','Apple':'system','Google Services':'system','Amazon AWS':'system','Google PKI':'system','Cloudflare':'system'};
const BARCOLS={'social':'#3b82f6','work':'#10b981','media':'#ef4444','system':'#6b7280','other':'#8b5cf6'};

function svc(raw){const d=raw.toLowerCase().replace(/\.$/,'');if(DOMAIN_MAP[d])return DOMAIN_MAP[d];const p=d.split('.');for(let i=0;i<p.length;i++){const s=p.slice(i).join('.');if(DOMAIN_MAP[s])return DOMAIN_MAP[s];}return p.length>=2?p[p.length-2].charAt(0).toUpperCase()+p[p.length-2].slice(1):raw;}
function ico(s){return ICONS[s]||'🌐';}
function cat(s){return CATS[s]||'other';}
function bc(s){return BARCOLS[cat(s)];}
function fmtN(n){return n>=1000?(n/1000).toFixed(1)+'k':String(n);}

let selDev=null,allDevs=[],hours=24,devDns={},devTraffic={},typeFilter='all',catFilter=null,devRows=[],globalDns=[],trafficHours=168;
let names=JSON.parse(localStorage.getItem('nb_names')||'{}');
let customCats=JSON.parse(localStorage.getItem('nb_cats')||'{}');

async function loadCatsFromDB(){
  try{
    const r=await fetch('/api/domain-categories');
    const d=await r.json();
    const dbCats=d.data||{};
    // Мержим: БД имеет приоритет над localStorage
    customCats={...customCats,...dbCats};
    localStorage.setItem('nb_cats',JSON.stringify(customCats));
    console.log('Loaded',Object.keys(dbCats).length,'categories from DB');
  }catch(e){console.error('loadCatsFromDB:',e);}
}

function getCatColor(s){return CAT_INFO[getCat(s)]?.color||'#8b5cf6';}
function devType(d){const n=dn(d).toLowerCase();if(/iphone|ipad|android|mobile/i.test(n))return'phone';if(/sip|t[0-9]{2}w|yealink|grandstream/i.test(n))return'sip';if(/router|mikrotik|switch|nvr|camera|cam|printer/i.test(n))return'other';return'pc';}

function dn(d){const k=d.mac_address||d.ip_current;if(names[k])return names[k];if(d.hostname&&d.hostname.trim())return d.hostname.trim();return d.ip_current||'Устройство';}
function di(d){const n=dn(d).toLowerCase();if(/iphone|ipad/i.test(n))return'📱';if(/android|phone|mobile/i.test(n))return'📱';if(/sip|t[0-9]{2}w|yealink/i.test(n))return'☎️';if(/printer/i.test(n))return'🖨️';if(/router|mikrotik/i.test(n))return'🌐';if(/vmware|server/i.test(n))return'🖥️';return'💻';}
function isOn(d){if(devDns[d.ip_current]>0)return true;return d.last_seen&&Date.now()-new Date(d.last_seen).getTime()<30*60*1000;}

function renderDevs(){
  const q=(document.getElementById('dev-srch')?.value||'').toLowerCase().trim();
  const sortBy=document.getElementById('dev-srt')?.value||'dns';
  const el=document.getElementById('dev-list');
  if(!allDevs.length){el.innerHTML='<div class="empty"><div class="empty-icon">📡</div>Нет устройств</div>';return;}
  let devs=[...allDevs];
  if(q)devs=devs.filter(d=>(dn(d)||'').toLowerCase().includes(q)||(d.ip_current||'').includes(q)||(d.mac_address||'').toLowerCase().includes(q));
  if(typeFilter!=='all')devs=devs.filter(d=>devType(d)===typeFilter);
  if(!devs.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>Ничего не найдено</div>';return;}
  const sorted=devs.sort((a,b)=>{
    if(sortBy==='dns'){const ao=isOn(a)?1:0,bo=isOn(b)?1:0;if(ao!==bo)return bo-ao;return(devDns[b.ip_current]||0)-(devDns[a.ip_current]||0);}
    if(sortBy==='name')return(dn(a)||'').localeCompare(dn(b)||'');
    if(sortBy==='ip'){const ai=(a.ip_current||'0.0.0.0').split('.').map(Number),bi=(b.ip_current||'0.0.0.0').split('.').map(Number);for(let i=0;i<4;i++)if(ai[i]!==bi[i])return ai[i]-bi[i];return 0;}
    if(sortBy==='online')return(isOn(b)?1:0)-(isOn(a)?1:0);
    return 0;
  });
  el.innerHTML=sorted.map(d=>{
    const nm=dn(d),ic=di(d),act=selDev&&selDev.ip_current===d.ip_current,on=isOn(d);
    const mid=d.mac_address.replace(/:/g,'');
    const dc=devDns[d.ip_current]||0;
    const dcls=dc>200?'high':dc>50?'med':'';
    // Считаем категории для устройства из globalDns
    const devDnsRows=globalDns.filter(r=>r.ip===d.ip_current);
    const devCats={};
    devDnsRows.forEach(r=>{const c=getCat(svc(r.domain));devCats[c]=(devCats[c]||0)+r.hits;});
    const devTotal=Object.values(devCats).reduce((s,v)=>s+v,0)||1;
    const CAT_ORDER_D=['work','social','entertainment','gaming','system','other'];
    const catMini=CAT_ORDER_D.filter(c=>devCats[c]).map(c=>{
      const ci=CAT_INFO[c];
      const pct=Math.round(devCats[c]/devTotal*100);
      if(pct<1)return''; // скрываем если меньше 1%
      return`<span style="display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:3px;background:${ci.color}25;color:${ci.color};font-size:9px;font-weight:700;font-family:var(--mono)">${ci.label.split(' ')[0]}${pct}%</span>`;
    }).join('');
    return`<div class="device${act?' active':''}" onclick='sel(${JSON.stringify(d).replace(/"/g,"&quot;")})'>
      <div class="dev-av">${ic}</div>
      <div class="dev-info">
        <div class="dev-name" id="dn-${mid}">${nm}</div>
        <div class="dev-ip">${d.ip_current} · ${d.mac_address}</div>
        ${devTraffic[d.ip_current]?`<div style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:1px">↑ ${devTraffic[d.ip_current].fmt}/7д</div>`:''}
        ${catMini?`<div style="display:flex;gap:3px;margin-top:3px;flex-wrap:wrap">${catMini}</div>`:''}
      </div>
      <div class="dev-meta">
        <button class="edit-btn" onclick="event.stopPropagation();edit('${d.mac_address}','${d.ip_current}')">✏️</button>
        ${dc>0?`<div class="dev-dns ${dcls}" title="DNS/1ч">${fmtN(dc)}</div>`:''}
        <div class="dot ${on?'on':'off'}"></div>
      </div>
    </div>`;
  }).join('');
}

function edit(mac,ip){
  const mid=mac.replace(/:/g,'');const el=document.getElementById('dn-'+mid);if(!el)return;
  const cur=el.textContent;
  el.innerHTML=`<input class="dev-name-inp" id="inp-${mid}" value="${cur}" maxlength="30">`;
  const inp=document.getElementById('inp-'+mid);inp.focus();inp.select();
  inp.onblur=()=>save(mac,ip,inp.value);

    el.innerHTML=rows.map(u=>`<div class="u-row" onclick="document.getElementById('du-modal').remove();selByIp('${u.ip}')">
      <div style="font-size:16px">💻</div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${u.name}</div><div style="font-size:10px;color:var(--text3);font-family:var(--mono)">${u.ip}</div></div>

      <div style="width:50px"><div style="height:3px;background:var(--border);border-radius:2px"><div style="height:100%;width:${Math.round(u.hits/maxH*100)}%;background:var(--accent);border-radius:2px"></div></div></div>
    </div>`).join('');
  }catch(e){console.error(e);}
}
function selByIp(ip){const dev=allDevs.find(d=>d.ip_current===ip);if(dev)sel(dev);else toast('Не найдено: '+ip);}
function openTopSites(){
  const bySvc={};
  globalDns.forEach(row=>{const s=svc(row.domain);if(!bySvc[s])bySvc[s]={name:s,domain:row.domain,hits:0};bySvc[s].hits+=row.hits;});
  const sorted=Object.values(bySvc).sort((a,b)=>b.hits-a.hits).slice(0,25);
  const maxH=sorted[0]?.hits||1;
  document.getElementById('top-modal')?.remove();
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='top-modal';
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  bg.innerHTML=`<div class="modal-box"><div class="modal-hdr"><div class="modal-title">📊 Топ сайтов за 1 час</div><button class="modal-close" onclick="document.getElementById('top-modal').remove()">✕</button></div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:12px">Кликните → кто заходил + изменить категорию</div>
    ${sorted.map(item=>{const c=getCatColor(item.name);return`<div class="u-row" onclick="document.getElementById('top-modal').remove();openDomainMenu('${item.domain.replace(/'/g,"\\'")}','${item.name.replace(/'/g,"\\'")}','${getCat(item.name)}')">
      <div style="font-size:18px">${ico(item.name)}</div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${item.name}</div><div style="font-size:10px;color:var(--text3);font-family:var(--mono)">${item.domain}</div></div>
      <div style="font-size:12px;font-family:var(--mono);color:${c};margin-right:8px">${fmtN(item.hits)}×</div>
      <div style="width:50px"><div style="height:3px;background:var(--border);border-radius:2px"><div style="height:100%;width:${Math.round(item.hits/maxH*100)}%;background:${c};border-radius:2px"></div></div></div>
    </div>`;}).join('')}
  </div>`;
  document.body.appendChild(bg);
}

function applyAiResults(){
  // Читаем все select'ы в модалке и применяем
  const modal = document.getElementById('ai-all-modal');
  if(!modal) return;
  let count = 0;
  modal.querySelectorAll('select[id^="ai-sel-"]').forEach(sel=>{
    const svcName = sel.id.replace('ai-sel-','').replace(/_/g,' ');
    // Восстанавливаем оригинальное имя сервиса
    const origName = Object.keys(window._aiSuggestions||{}).find(s=>
      s.replace(/[^a-z0-9]/gi,'_') === sel.id.replace('ai-sel-','')
    ) || svcName;
    if(sel.value){
      customCats[origName] = sel.value;
      count++;
    }
  });
  localStorage.setItem('nb_cats', JSON.stringify(customCats));
  modal.remove();
  window._aiSuggestions = {};
  toast('✓ Применено категорий: '+count);
  if(selDev) act(selDev, hours);
}

async function aiAnalyzeAll(devName, event) {
  const btn = event.target;
  const rows = devRows;
  if(!rows || !rows.length){toast('Нет доменов для анализа','yellow');return;}

  // Получаем уникальные сервисы которые ещё не категоризированы вручную
  const services = [...new Set(rows.map(r=>svc(r.domain)))];
  const uncategorized = services.filter(s=>!customCats[s]);
  const total = uncategorized.length;

  if(total === 0){toast('Все домены уже категоризированы!');return;}

  btn.disabled = true;
  btn.innerHTML = '⏳ 0/' + total;

  // Прогресс модалка
  const bg = document.createElement('div');
  bg.className = 'modal-bg'; bg.id = 'ai-all-modal';
  bg.innerHTML = `<div class="modal-box" style="width:500px">
    <div class="modal-hdr">
      <div class="modal-title">🤖 AI анализ доменов: ${devName}</div>
      <button class="modal-close" onclick="document.getElementById('ai-all-modal').remove()">✕</button>
    </div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:12px">Анализирую ${total} доменов...</div>
    <div style="background:var(--bg3);border-radius:6px;height:6px;margin-bottom:16px">
      <div id="ai-progress-bar" style="height:100%;width:0%;background:var(--purple);border-radius:6px;transition:width .3s"></div>
    </div>
    <div id="ai-results" style="display:flex;flex-direction:column;gap:4px;max-height:400px;overflow-y:auto"></div>
    <div id="ai-summary" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:none">
      <div style="font-size:12px;color:var(--green);font-weight:600" id="ai-done-msg"></div>
      <button onclick="applyAiResults()" style="margin-top:8px;background:var(--accent);border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--sans)">✓ Применить выбранные категории</button>
    </div>
  </div>`;
  document.body.appendChild(bg);

  const rules = Object.entries(customCats).map(([s,c])=>s+'='+c).join(', ');
  const resultsEl = document.getElementById('ai-results');
  const progressBar = document.getElementById('ai-progress-bar');
  let done = 0, applied = 0;

  // Анализируем пакетами по 3 параллельно
  for(let i=0; i<uncategorized.length; i+=3){
    const batch = uncategorized.slice(i, i+3);
    await Promise.all(batch.map(async s=>{
      try{
        const domain = rows.find(r=>svc(r.domain)===s)?.domain || s;
        const resp = await fetch('/api/domain-category?domain='+encodeURIComponent(domain)+'&custom_rules='+encodeURIComponent(rules));
        const result = await resp.json();
        done++;
        progressBar.style.width = Math.round(done/total*100)+'%';
        btn.innerHTML = '⏳ '+done+'/'+total;

        if(result.ok){
          const ci = CAT_INFO[result.category]||{label:result.category,color:'#8b5cf6'};
          applied++;
          // Сохраняем предложение AI но НЕ применяем сразу
          window._aiSuggestions = window._aiSuggestions||{};
          window._aiSuggestions[s] = result;

          if(resultsEl){
            const safeWarn = result.safe===false
              ? '<span style="background:rgba(239,68,68,.2);color:var(--red);padding:1px 6px;border-radius:3px;font-size:10px;border:1px solid var(--red)">⚠️ ОПАСНО</span>'
              : '';
            const sid = 'ai-sel-'+s.replace(/[^a-z0-9]/gi,'_');
            const row = document.createElement('div');
            row.style.cssText = 'padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:4px';
            row.innerHTML = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'+
              '<span style="font-size:15px">'+ico(s)+'</span>'+
              '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600">'+s+'</div>'+
              '<div style="font-size:10px;color:var(--text3);font-family:var(--mono)">'+domain+'</div></div>'+
              safeWarn+
            '</div>'+
            '<div style="font-size:10px;color:var(--text2);margin-bottom:6px;padding:4px 8px;background:var(--bg4);border-radius:4px">💭 '+result.reason+'</div>'+
            '<select id="'+sid+'" style="width:100%;background:var(--bg3);border:1px solid '+ci.color+';color:var(--text);padding:5px 8px;border-radius:6px;font-size:12px;outline:none;cursor:pointer">'+
              Object.entries(CAT_INFO).map(([id,c])=>
                '<option value="'+id+'"'+(id===result.category?' selected':'')+'>'+c.label+'</option>'
              ).join('')+
            '</select>';
            resultsEl.appendChild(row);
            resultsEl.scrollTop = resultsEl.scrollHeight;
          }
        }
      }catch(e){done++;}
    }));
    await new Promise(r=>setTimeout(r,300)); // пауза между батчами
  }

  // Сохраняем все в localStorage и БД
  localStorage.setItem('nb_cats', JSON.stringify(customCats));
  // Batch сохранение в БД
  const saves=Object.entries(customCats).map(([s,c])=>
    fetch('/api/domain-categories',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({service_name:s,category:c})})
  );
  try{await Promise.all(saves);}catch(e){console.error('batch save error:',e);}
  progressBar.style.width = '100%';
  btn.innerHTML = '🤖 AI анализ';
  btn.disabled = false;

  const summaryEl = document.getElementById('ai-summary');
  const doneMsg = document.getElementById('ai-done-msg');
  if(summaryEl) summaryEl.style.display='block';
  if(doneMsg) doneMsg.textContent = '✓ Готово! Категоризировано: '+applied+' из '+total+' доменов';
  toast('✓ AI категоризировал '+applied+' доменов');
}

async function changeDevTraffic(days, id){
  id = id || (days+'d');
  ['1h','1d','7d','30d'].forEach(tid=>{
    const b=document.getElementById('dtp-'+tid);
    if(!b)return;
    if(tid===id){b.style.background='var(--accent)';b.style.color='#fff';b.style.fontWeight='700';}
    else{b.style.background='transparent';b.style.color='var(--text2)';b.style.fontWeight='400';}
  });
  if(!selDev)return;
  const hours = id==='1h' ? 1 : Math.round(days*24);
  const label = id==='1h'?'1ч':id==='1d'?'1д':id==='7d'?'7д':'30д';
  try{
    const rt=await fetch('/api/reports/device-traffic?hours='+hours);
    const dt=await rt.json();
    const found=(dt.data||[]).find(x=>x.ip===selDev.ip_current);
    const el=document.getElementById('dev-traffic-val');
    if(el)el.textContent='📊 '+(found?.bytes_fmt||'0 B')+' за '+label;
  }catch(e){}
}

async function setTrafficPeriod(days, id){
  id = id || (days+'d');
  trafficHours = id==='1h' ? 1 : days * 24;
  // Обновляем стили кнопок
  ['1h','1d','7d','30d'].forEach(tid=>{
    const b=document.getElementById('tp-'+tid);
    if(!b)return;
    if(tid===id){
      b.style.background='var(--accent)';b.style.color='#fff';b.style.fontWeight='700';
    } else {
      b.style.background='transparent';b.style.color='var(--text2)';b.style.fontWeight='400';
    }
  });
  await loadTrafficTop();
  // Обновляем summary
  try{
    const r=await fetch('/api/reports/summary?hours='+(days*24));
    const d=await r.json();
    if(d.period_bytes_fmt) document.getElementById('s-bytes').textContent=d.period_bytes_fmt;
    if(d.period_sessions!==undefined) document.getElementById('s-sess').textContent='сессий: '+d.period_sessions.toLocaleString();
  }catch(e){}
}

async function loadTrafficTop(){
  try{
    const rt = await fetch('/api/reports/device-traffic?hours='+trafficHours);
    const dt = await rt.json();
    // Обновляем devTraffic
    devTraffic={};
    (dt.data||[]).forEach(x=>{devTraffic[x.ip]={bytes:x.bytes,fmt:x.bytes_fmt};});
    const filtered = (dt.data||[]).filter(x=>allDevs.some(d=>d.ip_current===x.ip));
    const mx = filtered[0]?.bytes||1;
    ttRows('tt-traffic', filtered.slice(0,5).map(x=>{
      const dv = allDevs.find(d=>d.ip_current===x.ip);
      return{i:di(dv),n:dn(dv),v:x.bytes_fmt,r:x.bytes};
    }), mx);
    renderDevs();
  }catch(e){console.error(e);}
}

async function loadAll(){
  await loadCatsFromDB();
  await Promise.all([loadSummary(),loadDevices()]);
  await loadGlobal();
  if(selDev)act(selDev,hours);
}
loadAll();setInterval(loadAll,60000);
