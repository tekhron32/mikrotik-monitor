version: "3.9"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: nebulanet-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./migrations/clickhouse:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: nebulanet
      CLICKHOUSE_USER: nebulanet
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-nebulanet_secret}
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: nebulanet-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: nebulanet
      POSTGRES_USER: nebulanet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nebulanet_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebulanet"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nebulanet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: nebulanet-collector
    restart: unless-stopped
    ports:
      - "2055:2055/udp"
      - "514:514/udp"
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: nebulanet
      CLICKHOUSE_USER: nebulanet
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-nebulanet_secret}
      POSTGRES_DSN: postgresql://nebulanet:${POSTGRES_PASSWORD:-nebulanet_secret}@postgres:5432/nebulanet
      REDIS_URL: redis://redis:6379/0
      FLUSH_INTERVAL: "30"
      LOG_LEVEL: INFO
    depends_on:
      clickhouse: {condition: service_healthy}
      postgres:   {condition: service_healthy}
      redis:      {condition: service_healthy}

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: nebulanet-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      CLICKHOUSE_URL: http://nebulanet:${CLICKHOUSE_PASSWORD:-nebulanet_secret}@clickhouse:8123/nebulanet
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_DB: nebulanet
      CLICKHOUSE_USER: nebulanet
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-nebulanet_secret}
      POSTGRES_DSN: postgresql://nebulanet:${POSTGRES_PASSWORD:-nebulanet_secret}@postgres:5432/nebulanet
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MIKROTIK_HOST: ${MIKROTIK_HOST:-192.168.1.200}
      MIKROTIK_USER: ${MIKROTIK_USER:-nebulanet}
      MIKROTIK_PASS: ${MIKROTIK_PASS:-Nebula2026!}
      LOG_LEVEL: INFO
    depends_on:
      clickhouse: {condition: service_healthy}
      postgres:   {condition: service_healthy}
      redis:      {condition: service_healthy}

  mt-poller:
    image: python:3.12-slim
    container_name: nebulanet_mt_poller
    restart: unless-stopped
    volumes:
      - ./collector:/app
    working_dir: /app
    command: >
      bash -c "pip install librouteros psycopg2-binary --break-system-packages -q &&
               python mikrotik_dns_poller.py"
    environment:
      MT_HOST: 192.168.1.200
      MT_USER: nebulanet
      MT_PASS: "Nebula2026!"
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: nebulanet
      CLICKHOUSE_USER: nebulanet
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-nebulanet_secret}
      POLL_INTERVAL: "15"
      LOCATION_ID: "1"
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  clickhouse_data:
  postgres_data:
  redis_data:
